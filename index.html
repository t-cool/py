<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Python 入門</title>
    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <!-- Markdown-it and KaTeX -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-katex@2.0.3/dist/markdown-it-katex.min.js"></script>
    <!-- github-markdown-css -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css"
    />
    <!-- Prism.js for Syntax Highlighting -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
    />
    <!-- Font Awesome for Matplotlib Toolbar -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />

    <style>
      :root {
        --sidebar-width: 250px;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
        background-color: #f8f9fa;
      }
      #sidebar-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 1400;
      }
      body.sidebar-open #sidebar-overlay {
        display: block;
      }
      body.sidebar-open #sidebar-toggle {
        display: none;
      }
      #sidebar-toggle {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 1600;
        background-color: #2c3e50;
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      #sidebar {
        position: fixed;
        top: 0;
        left: calc(-1 * var(--sidebar-width));
        bottom: 0;
        width: var(--sidebar-width);
        background-color: #2c3e50;
        color: white;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #dee2e6;
        z-index: 1500;
        transition: left 0.3s ease;
      }
      body.sidebar-open #sidebar {
        left: 0;
      }
      #sidebar h2 {
        padding: 20px;
        margin: 0;
        background-color: #1a252f;
        font-size: 1.1rem;
        cursor: pointer;
      }
      .nav-category {
        padding: 8px 15px;
        font-weight: bold;
        font-size: 0.85rem;
        color: #95a5a6;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .nav-item {
        padding: 8px 25px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.2s;
        border-left: 4px solid transparent;
      }
      .nav-item:hover {
        background-color: #34495e;
      }
      .nav-item.active {
        background-color: #3e5871;
        border-left-color: #3498db;
        color: #3498db;
      }
      #main-container {
        flex: 1;
        display: flex;
        flex-direction: row;
        overflow: hidden;
        width: 100%;
      }
      #content-area {
        flex: 1;
        overflow-y: auto;
        padding: 0px 40px 40px 80px;
        background: white;
      }
      #runner-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-left: 1px solid #dee2e6;
        background: white;
      }
      #toolbar {
        padding: 10px;
        background: #f1f3f5;
        border-bottom: 1px solid #dee2e6;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #run-button {
        padding: 8px 16px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      #run-button:disabled {
        background-color: #adb5bd;
      }
      #editor-container {
        flex: 1;
        border-bottom: 1px solid #dee2e6;
      }
      #monaco-editor {
        padding-top: 10px;
        box-sizing: border-box;
        background-color: #1e1e1e;
      }
      #console-container {
        height: 300px;
        background-color: #1e1e1e;
        color: #d4d4d4;
        padding: 10px;
        font-family: Consolas, Monaco, "Andale Mono", "Ubuntu Mono", monospace;
        overflow-y: auto;
        white-space: pre-wrap;
        font-size: 16px;
        padding-left: 68px;
      }
      #status {
        font-size: 12px;
        color: #6c757d;
      }
      .markdown-body {
        box-sizing: border-box;
        min-width: 200px;
        max-width: none !important;
        margin: 0 !important;
        width: 100% !important;
        color: #24292f !important; /* Standard GitHub dark text color */
      }

      /* コードブロックの背景を黒に固定 */
      .markdown-body pre {
        background-color: #000000 !important;
        padding: 16px !important;
        border-radius: 8px !important;
        border: 1px solid #333 !important;
        overflow: auto !important;
      }

      /* コード内の基本文字色を明るい色に固定 (Prismのテーマを補完) */
      .markdown-body pre code {
        background-color: transparent !important;
        color: #f8f8f2 !important;
        text-shadow: none !important;
        padding: 0 !important;
        font-family: Consolas, Monaco, "Andale Mono", "Ubuntu Mono", monospace !important;
      }

      /* インラインコードのスタイル */
      .markdown-body :not(pre) > code {
        background-color: #f0f0f0 !important;
        color: #d1104a !important;
        padding: 2px 4px !important;
        border-radius: 3px !important;
      }

      /* テーブルのスタイル（白背景に固定） */
      .markdown-body table {
        display: table !important;
        background-color: #ffffff !important;
        color: #24292f !important;
        border-collapse: collapse !important;
        width: 100% !important;
        margin: 16px 0 !important;
        border: 1px solid #d0d7de !important;
      }

      .markdown-body table th,
      .markdown-body table td {
        background-color: #ffffff !important;
        color: #24292f !important;
        border: 1px solid #d0d7de !important;
        padding: 8px 13px !important;
      }

      .markdown-body table tr:nth-child(2n) {
        background-color: #f6f8fa !important;
      }

      .markdown-body table tr:nth-child(2n) td {
        background-color: #f6f8fa !important;
      }

      /* SVG画像の背景を白にする */
      .markdown-body img[src*=".svg"] {
        background-color: #ffffff !important;
      }

      /* Admonition Styles */
      .admonition {
        margin: 1.5rem 0;
        padding: 1.2rem;
        border-radius: 8px;
        background-color: #f8f9fa;
        border: 1px solid #e9ecef;
        border-left: 5px solid #ccc;
      }
      .admonition-chip {
        display: inline-block;
        padding: 2px 12px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: bold;
        color: white;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .admonition.note {
        border-left-color: #3498db;
        background-color: #f0f7ff;
      }
      .admonition.note .admonition-chip {
        background-color: #3498db;
      }
      .admonition.tip {
        border-left-color: #2ecc71;
        background-color: #f0fff4;
      }
      .admonition.tip .admonition-chip {
        background-color: #2ecc71;
      }
      .admonition.info {
        border-left-color: #3498db;
        background-color: #f0f7ff;
      }
      .admonition.info .admonition-chip {
        background-color: #3498db;
      }
      .admonition.caution,
      .admonition.warning {
        border-left-color: #f39c12;
        background-color: #fffaf0;
      }
      .admonition.caution .admonition-chip,
      .admonition.warning .admonition-chip {
        background-color: #f39c12;
      }
      .admonition.danger {
        border-left-color: #e74c3c;
        background-color: #fff5f5;
      }
      .admonition.danger .admonition-chip {
        background-color: #e74c3c;
      }
      .admonition-content {
        color: #24292f;
      }

      .view-source-btn {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        margin: 10px 0;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.9rem;
        color: #007bff;
        text-decoration: none;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        justify-content: center;
        align-items: center;
      }
      .modal-content {
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        max-width: 90%;
        max-height: 90%;
        overflow: auto;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      }
      .close-modal {
        position: absolute;
        right: 15px;
        top: 5px;
        font-size: 35px;
        font-weight: bold;
        color: #aaa;
        cursor: pointer;
        line-height: 1;
      }
      .close-modal:hover {
        color: #333;
      }
      #modal-render-area canvas {
        max-width: 100%;
        height: auto !important;
        display: block;
        margin: 10px 0;
      }
      .matplotlib-toolbar-button {
        padding: 4px 8px;
        margin: 2px;
        cursor: pointer;
        border: 1px solid #ddd;
        background: #eee;
        border-radius: 3px;
      }

      /* Loading Modal */
      #loading-modal {
        display: flex;
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 1);
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      #loading-modal .modal-content {
        border: none;
        box-shadow: none;
        background: none;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #loading-modal p {
        font-size: 1.2rem;
        font-weight: bold;
        color: #2c3e50;
        margin-top: 20px;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* YouTube iframe ratio */
      .markdown-body iframe {
        width: 100%;
        aspect-ratio: 16 / 10;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div id="loading-modal">
      <div class="modal-content">
        <div class="spinner"></div>
        <p>システムの起動中です。しばらくお待ちください。</p>
      </div>
    </div>
    <div id="sidebar-overlay"></div>
    <button id="sidebar-toggle" title="メニューを開く">
      <i class="fa fa-bars"></i>
    </button>
    <div id="sidebar">
      <h2 onclick="location.href='/py/'">Python 入門</h2>
      <div id="nav-list"></div>
    </div>
    <div id="main-container">
      <div id="content-area" class="markdown-body">
        <div id="page-content">左のメニューから項目を選択してください。</div>
      </div>
      <div id="runner-area">
        <div id="toolbar">
          <button id="run-button" disabled>実行 (Run)</button>
          <div id="status">初期化中...</div>
        </div>
        <div id="editor-container">
          <div id="monaco-editor" style="height: 100%; width: 100%"></div>
        </div>
        <div id="console-container"><div id="console-output"></div></div>
      </div>
    </div>
    <div id="render-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal" id="close-modal">&times;</span>
        <div id="modal-render-area"></div>
      </div>
    </div>

    <!-- Prism.js Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-mermaid.min.js"></script>

    <script>
      const docsNav = [
        { title: "はじめに", path: "docs/01-introduction/index.mdx" },
        {
          category: "1. Pythonの基本",
          items: [
            {
              title: "はじめてのPython",
              path: "docs/02-python/01-getting-started/index.mdx",
            },
            {
              title: "数と式",
              path: "docs/02-python/02-expressions/index.mdx",
            },
            { title: "変数", path: "docs/02-python/03-variables/index.mdx" },
            { title: "関数", path: "docs/02-python/04-function/index.mdx" },
            { title: "条件分岐 (if)", path: "docs/02-python/07-if/index.mdx" },
            {
              title: "繰り返し (for)",
              path: "docs/02-python/08-for/index.mdx",
            },
            { title: "配列", path: "docs/02-python/09-array/index.mdx" },
            {
              title: "多次元配列",
              path: "docs/02-python/10-multi-array/index.mdx",
            },
            {
              title: "ライブラリ",
              path: "docs/02-python/05-library/index.mdx",
            },
            { title: "pip", path: "docs/02-python/06-pip/index.mdx" },
            { title: "練習問題", path: "docs/02-python/11-practice/index.mdx" },
          ],
        },
        {
          category: "3. アルゴリズム",
          items: [
            {
              title: "計算量 (オーダー)",
              path: "docs/05-algorithms/02-order/index.mdx",
            },
            { title: "探索", path: "docs/05-algorithms/03-search/index.mdx" },
            { title: "ソート", path: "docs/05-algorithms/04-sort/index.mdx" },
            {
              title: "再帰",
              path: "docs/05-algorithms/01-recursion/index.mdx",
            },
            {
              title: "ライフゲーム",
              path: "docs/03-advanced/02-life-game/index.mdx",
            },
            {
              title: "連立一次方程式",
              path: "docs/05-algorithms/05-gaussian-elimination/index.mdx",
            },
            {
              title: "動的計画法 (DP)",
              path: "docs/05-algorithms/06-dp/index.mdx",
            },
            {
              title: "等速直線運動",
              path: "docs/04-simulation/uniform-linear-motion/index.mdx",
            },
            {
              title: "放物運動",
              path: "docs/04-simulation/parabolic-motion/index.mdx",
            },
            {
              title: "空気抵抗がある場合の運動",
              path: "docs/04-simulation/resisted-motion/index.mdx",
            },
            {
              title: "モンテカルロ法",
              path: "docs/04-simulation/02-monte-carlo/index.mdx",
            },
            { title: "画像処理", path: "docs/03-advanced/01-image/index.mdx" },
            { title: "誤差", path: "docs/03-advanced/03-error/index.mdx" },
          ],
        },
      ];
      let pyodide, editor;
      const md = window.markdownit({
        html: true,
        linkify: true,
        typographer: true,
        highlight: function (str, lang) {
          if (lang && Prism.languages[lang]) {
            try {
              return Prism.highlight(str, Prism.languages[lang], lang);
            } catch (__) {}
          }
          return ""; // use external default escaping
        },
      });
      if (window.markdownitKatex) {
        md.use(window.markdownitKatex);
      }
      const navListEl = document.getElementById("nav-list"),
        pageContentEl = document.getElementById("page-content"),
        runButton = document.getElementById("run-button"),
        statusEl = document.getElementById("status"),
        consoleOutputEl = document.getElementById("console-output"),
        renderModalEl = document.getElementById("render-modal"),
        modalRenderAreaEl = document.getElementById("modal-render-area"),
        closeModalBtn = document.getElementById("close-modal");
      async function init() {
        renderNav();
        await initPyodide();
        await loadMonaco();
        document.getElementById("loading-modal").style.display = "none";
        const params = new URLSearchParams(window.location.search);
        loadDoc(params.get("doc") || "docs/01-introduction/index.mdx");
        closeModalBtn.onclick = () => (renderModalEl.style.display = "none");
        window.onclick = (e) => {
          if (e.target == renderModalEl) renderModalEl.style.display = "none";
        };

        document.getElementById("sidebar-toggle").onclick = () => {
          document.body.classList.toggle("sidebar-open");
        };
        document.getElementById("sidebar-overlay").onclick = () => {
          document.body.classList.remove("sidebar-open");
        };
      }
      function renderNav() {
        docsNav.forEach((item) => {
          if (item.category) {
            const catEl = document.createElement("div");
            catEl.className = "nav-category";
            catEl.textContent = item.category;
            navListEl.appendChild(catEl);
            item.items.forEach((subItem) => createNavItem(subItem));
          } else {
            createNavItem(item);
          }
        });
      }
      function createNavItem(item) {
        const el = document.createElement("div");
        el.className = "nav-item";
        el.textContent = item.title;
        el.onclick = () => {
          document
            .querySelectorAll(".nav-item")
            .forEach((n) => n.classList.remove("active"));
          el.classList.add("active");
          loadDoc(item.path);
          const url = new URL(window.location);
          url.searchParams.set("doc", item.path);
          window.history.pushState({}, "", url);
          document.body.classList.remove("sidebar-open");
        };
        navListEl.appendChild(el);
      }
      async function initPyodide() {
        statusEl.textContent = "Pyodide初期化中...";
        pyodide = await loadPyodide();
        await pyodide.loadPackage(["micropip", "matplotlib", "numpy"]);
        try {
          const res = await fetch("static/py/ita.py");
          if (res.ok) {
            const code = await res.text();
            pyodide.FS.writeFile("/home/pyodide/ita.py", code);
            await pyodide.runPythonAsync("import ita");
          }
        } catch (err) {
          console.error(err);
        }
        pyodide.setStdout({ batched: (s) => appendConsole(s) });
        pyodide.setStderr({ batched: (s) => appendConsole(s, true) });
        statusEl.textContent = "準備完了";
        runButton.disabled = false;
      }
      function appendConsole(s, isErr = false) {
        const span = document.createElement("span");
        if (isErr) span.style.color = "#f44336";
        span.textContent = s + "\n";
        consoleOutputEl.appendChild(span);
        consoleOutputEl.scrollTop = consoleOutputEl.scrollHeight;
      }
      function loadMonaco() {
        return new Promise((res) => {
          const s = document.createElement("script");
          s.src =
            "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js";
          s.onload = () => {
            require.config({
              paths: {
                vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs",
              },
            });
            require(["vs/editor/editor.main"], () => {
              editor = monaco.editor.create(
                document.getElementById("monaco-editor"),
                {
                  value: "# コードを書いてください",
                  language: "python",
                  theme: "vs-dark",
                  automaticLayout: true,
                  fontSize: 16,
                  minimap: { enabled: false },
                }
              );
              res();
            });
          };
          document.body.appendChild(s);
        });
      }
      async function loadDoc(path) {
        pageContentEl.innerHTML = "読み込み中...";
        try {
          const res = await fetch(path);
          let text = await res.text();
          const dir = path.substring(0, path.lastIndexOf("/") + 1);

          // Handle Docusaurus imports: import varName from "./path.png"
          const imports = {};
          const importRegex = /import\s+(\w+)\s+from\s+['"]\.\/(.+?)['"]/g;
          let match;
          while ((match = importRegex.exec(text)) !== null) {
            imports[match[1]] = dir + match[2];
          }

          // Remove frontmatter and imports
          text = text
            .replace(/---[\s\S]*?---/, "")
            .replace(/import .* from .*;?$/gm, "");

          // Handle DocCardList and other MDX tags
          text = text
            .replace(/<DocCardList\s*\/>/g, "")
            .replace(/<[^>]+(Answer|ViewSource)[^>]*\/>/g, (m) => m); // Keep Answer and ViewSource, strip others

          // Convert MDX style={{...}} to standard HTML style="..."
          text = text.replace(/style=\{\{(.*?)\}\}/g, (match, p1) => {
            const style = p1
              .split(",")
              .map((s) => {
                const parts = s.split(":").map((x) => x.trim().replace(/['"]/g, ""));
                if (parts.length < 2) return "";
                const [k, v] = parts;
                const kebab = k.replace(/[A-Z]/g, (m) => "-" + m.toLowerCase());
                return `${kebab}: ${v}`;
              })
              .filter((s) => s)
              .join("; ");
            return `style="${style}"`;
          });

          // Replace imported image variables: {varName} -> path/to/image.png
          for (const [varName, imgPath] of Object.entries(imports)) {
            const varRegex = new RegExp(`\\{${varName}\\}`, "g");
            text = text.replace(varRegex, imgPath);
          }

          // Fix paths for images and other assets
          const resolvePath = (p) => {
            p = p.trim();
            if (p.startsWith("http") || p.startsWith("/")) return p;
            if (p.startsWith("docs/") || p.startsWith("static/")) return p;
            return dir + p.replace(/^\.\//, "");
          };

          // Replace Markdown images: ![alt](path)
          text = text.replace(/!\[(.*?)\]\((?!http|docs\/|static\/)(.*?)\)/g, (m, alt, p) => {
            return `![${alt}](${resolvePath(p)})`;
          });

          // Replace HTML-style src: src="path"
          text = text.replace(/src=["'](?!http|docs\/|static\/)(.*?)["']/g, (m, p) => {
            return m.replace(p, resolvePath(p));
          });

          // ViewSource processing with Preview
          const viewSourceRegex = /<ViewSource\s+path="([^"]+)"\s*\/>/g;
          let vsMatch;
          const vsTasks = [];
          while ((vsMatch = viewSourceRegex.exec(text)) !== null) {
            vsTasks.push({ full: vsMatch[0], path: vsMatch[1] });
          }

          for (const task of vsTasks) {
            try {
              const res = await fetch("static" + task.path);
              const j = await res.json();
              const code = j.cells
                .filter((c) => c.cell_type === "code")
                .map((c) => c.source.join(""))
                .join("\n\n");
              const preview = `\n\n<button class="view-source-btn" onclick="loadNotebook('${
                task.path
              }')">▶ エディタに読み込む (${task.path
                .split("/")
                .pop()})</button>\n<pre class="language-python"><code class="language-python">${md.utils.escapeHtml(
                code
              )}</code></pre>\n\n`;
              text = text.replace(task.full, preview);
            } catch (e) {
              console.error("Failed to load preview:", e);
              text = text.replace(
                task.full,
                `<button class="view-source-btn" onclick="loadNotebook('${
                  task.path
                }')">▶ コードを読み込む (${task.path
                  .split("/")
                  .pop()})</button>`
              );
            }
          }

          // Admonition processing (:::note etc.)
          text = text.replace(
            /^:::(note|tip|info|caution|danger|warning)(.*)$([\s\S]*?)^:::$/gm,
            (m, type, title, content) => {
              const displayTitle = (title.trim() || type).toUpperCase();
              return `<div class="admonition ${type}"><span class="admonition-chip">${displayTitle}</span><div class="admonition-content">\n\n${content.trim()}\n\n</div></div>`;
            }
          );

          // Hide stray or closing ::: that didn't match the block above
          text = text.replace(/^:::.*$/gm, "");

          pageContentEl.innerHTML = md.render(text);

          // Trigger Syntax Highlighting
          Prism.highlightAllUnder(pageContentEl);

          // Trigger KaTeX rendering
          if (window.renderMathInElement) {
            renderMathInElement(pageContentEl, {
              delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\(", right: "\\)", display: false },
                { left: "\\[", right: "\\]", display: true },
              ],
              throwOnError: false,
            });
          }
        } catch (err) {
          pageContentEl.innerHTML = "失敗";
          console.error(err);
        }
      }
      async function loadNotebook(p) {
        statusEl.textContent = `読み込み中...`;
        try {
          const res = await fetch("static" + p);
          const j = await res.json();
          const code = j.cells
            .filter((c) => c.cell_type === "code")
            .map((c) => c.source.join(""))
            .join("\n\n");
          if (editor) editor.setValue(code);
          statusEl.textContent = "準備完了";
        } catch (err) {
          statusEl.textContent = "失敗";
        }
      }
      runButton.onclick = async () => {
        if (!pyodide || !editor) return;
        consoleOutputEl.innerHTML = "";
        runButton.disabled = true;
        statusEl.textContent = "実行中...";
        try {
          let code = editor.getValue();
          const lines = code.split("\n"),
            processed = [];
          for (let l of lines) {
            const t = l.trim();
            const m = t.match(/^!pip\s+install\s+(.+)$/);
            if (m) {
              const pkgs = m[1]
                .split(/\s+/)
                .map((p) => p.trim())
                .filter((p) => p && p !== "ita");
              if (pkgs.length > 0)
                await pyodide.runPythonAsync(
                  `import micropip\nawait micropip.install(${JSON.stringify(
                    pkgs
                  )})`
                );
              processed.push("# " + l);
            } else if (t.startsWith("%")) {
              processed.push("# " + l);
            } else {
              processed.push(l);
            }
          }
          await pyodide.runPythonAsync(
            `import matplotlib.pyplot as plt\nplt.close('all')`
          );

          // Clear existing render outputs
          document
            .querySelectorAll('div[id^="matplotlib_"]')
            .forEach((d) => d.remove());
          document.querySelectorAll("canvas").forEach((c) => c.remove());
          modalRenderAreaEl.innerHTML = "";

          const result = await pyodide.runPythonAsync(processed.join("\n"));
          if (result !== undefined) {
            const reprFunc = pyodide.globals.get("repr");
            const resultStr = reprFunc(result);
            appendConsole(resultStr);
            reprFunc.destroy();
            if (result && result.destroy) result.destroy();
          }

          // Collect Matplotlib containers (including download buttons)
          const containers = document.querySelectorAll(
            'div[id^="matplotlib_"]'
          );
          const canvases = document.querySelectorAll("canvas");

          if (containers.length > 0 || canvases.length > 0) {
            if (containers.length > 0) {
              containers.forEach((c) => {
                if (c.id !== "modal-render-area")
                  modalRenderAreaEl.appendChild(c);
              });
            } else {
              canvases.forEach((c) => {
                if (!modalRenderAreaEl.contains(c))
                  modalRenderAreaEl.appendChild(c);
              });
            }
            renderModalEl.style.display = "flex";
          }
          statusEl.textContent = "完了";
        } catch (err) {
          appendConsole("エラー: " + err.message, true);
          statusEl.textContent = "エラー";
        } finally {
          runButton.disabled = false;
        }
      };
      init();
    </script>
  </body>
</html>
