      }

        flex: 3;

        color: #d4d4d4;
        padding: 10px;

        white-space: pre-wrap;
        font-size: 16px;
        padding-left: 68px;
        min-height: 0;
      }
      #status {
        font-size: 12px;
        color: #6c757d;
      }
      .markdown-body {
        box-sizing: border-box;
        min-width: 200px;
        max-width: none !important;
        margin: 0 !important;
        width: 100% !important;
        color: #24292f !important; /* Standard GitHub dark text color */
        line-height: 1.8 !important; /* 行間を広くする */
      }

      /* 見出しのフォントサイズを本文と同じにし、モダンなアクセント線を引く */
      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4,
      .markdown-body h5,
      .markdown-body h6 {
        font-size: 1em !important;
        border-bottom: 3px solid #3498db !important;
        padding-bottom: 2px !important;
        margin-top: 1.5em !important;
        margin-bottom: 0.5em !important;
        text-decoration: none !important;
        width: fit-content !important;
      }

      /* コードブロックの背景を黒に固定 */
      .markdown-body pre {
        background-color: #000000 !important;
        padding: 16px !important;
        border-radius: 8px !important;
        border: 1px solid #333 !important;
        overflow: auto !important;
        font-size: 12px !important;
      }

      /* コード内の基本文字色を明るい色に固定 (Prismのテーマを補完) */
      .markdown-body pre code {
        background-color: transparent !important;
        color: #f8f8f2 !important;
        text-shadow: none !important;
        padding: 0 !important;
        font-family: Consolas, Monaco, "Andale Mono", "Ubuntu Mono", monospace !important;
        font-size: 12px !important;
      }

      /* インラインコードのスタイル */
      .markdown-body :not(pre) > code {
        background-color: #fff5b1 !important;
        color: #d1104a !important;
        padding: 2px 4px !important;
        border-radius: 3px !important;
        font-size: 12px !important;
        font-weight: bold !important;
      }

      /* テーブルのスタイル（白背景に固定） */
      .markdown-body table {
        display: table !important;
        background-color: #ffffff !important;
        color: #24292f !important;
        border-collapse: collapse !important;
        width: 100% !important;
        margin: 16px 0 !important;
        border: 1px solid #d0d7de !important;
      }

      .markdown-body table th,
      .markdown-body table td {
        background-color: #ffffff !important;
        color: #24292f !important;
        border: 1px solid #d0d7de !important;
        padding: 8px 13px !important;
      }

      .markdown-body table tr:nth-child(2n) {
        background-color: #f6f8fa !important;
      }

      .markdown-body table tr:nth-child(2n) td {
        background-color: #f6f8fa !important;
      }

      /* SVG画像の背景を白にする */
      .markdown-body img[src*=".svg"] {
        background-color: #ffffff !important;
      }

      /* Admonition Styles */
      .admonition {
        margin: 1.5rem 0;
        padding: 1.2rem;
        border-radius: 8px;
        background-color: #f8f9fa;
        border: 1px solid #e9ecef;
        border-left: 5px solid #ccc;
      }
      .admonition-chip {
        display: inline-block;
        padding: 2px 12px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: bold;
        color: white;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .admonition.note {
        border-left-color: #3498db;
        background-color: #f0f7ff;
      }
      .admonition.note .admonition-chip {
        background-color: #3498db;
      }
      .admonition.tip {
        border-left-color: #2ecc71;
        background-color: #f0fff4;
      }
      .admonition.tip .admonition-chip {
        background-color: #2ecc71;
      }
      .admonition.info {
        border-left-color: #3498db;
        background-color: #f0f7ff;
      }
      .admonition.info .admonition-chip {
        background-color: #3498db;
      }
      .admonition.caution,
      .admonition.warning {
        border-left-color: #f39c12;
        background-color: #fffaf0;
      }
      .admonition.caution .admonition-chip,
      .admonition.warning .admonition-chip {
        background-color: #f39c12;
      }
      .admonition.danger {
        border-left-color: #e74c3c;
        background-color: #fff5f5;
      }
      .admonition.danger .admonition-chip {
        background-color: #e74c3c;
      }
      .admonition-content {
        color: #24292f;
      }

      .view-source-btn {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        margin: 10px 0;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.9rem;
        color: #007bff;
        text-decoration: none;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        justify-content: center;
        align-items: center;
      }
      .modal-content {
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        max-width: 90%;
        max-height: 90%;
        overflow: auto;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      }
      .close-modal {
        position: absolute;
        right: 15px;
        top: 5px;
        font-size: 35px;
        font-weight: bold;
        color: #aaa;
        cursor: pointer;
        line-height: 1;
      }
      .close-modal:hover {
        color: #333;
      }
      #modal-render-area canvas {
        max-width: 100%;
        height: auto !important;
        display: block;
        margin: 10px 0;
      }
      .matplotlib-toolbar-button {
        padding: 4px 8px;
        margin: 2px;
        cursor: pointer;
        border: 1px solid #ddd;
        background: #eee;
        border-radius: 3px;
      }

      /* Loading Modal */
      #loading-modal {
        display: flex;
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 1);
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      #loading-modal .modal-content {
        border: none;
        box-shadow: none;
        background: none;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #loading-modal p {
        font-size: 1.2rem;
        font-weight: bold;
        color: #2c3e50;
        margin-top: 20px;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* YouTube iframe ratio */
      .markdown-body iframe {
        width: 100%;
        aspect-ratio: 16 / 10;
        height: auto;
      }

      /* Learning Record Table Styles */
      .markdown-body .progress-table {
        width: 70% !important;
        display: table !important;
        border-collapse: collapse;
        margin-top: 20px;
        table-layout: auto;
      }
      .progress-table th,
      .progress-table td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: left;
        line-height: 1.4;
      }
      /* Narrow columns */
      .progress-table th:nth-child(1),
      .progress-table td:nth-child(1),
      .progress-table th:nth-child(2),
      .progress-table td:nth-child(2),
      .progress-table th:nth-child(4),
      .progress-table td:nth-child(4) {
        width: 1%;
        white-space: nowrap;
      }
      /* Exercise content column can wrap */
      .progress-table td:nth-child(3) {
        word-break: break-all;
      }
      .progress-table th {
        background-color: #f2f2f2;
      }
      .markdown-body .progress-table tr,
      .markdown-body .progress-table td,
      .markdown-body .progress-table tr:nth-child(n),
      .markdown-body .progress-table tr:nth-child(n) td {
        background-color: #ffffff !important;
      }
      .status-badge {
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
      }
      .status-completed {
        background-color: #4caf50;
        color: white;
      }
      .status-incomplete {
        background-color: #ff9800;
        color: white;
      }
      .check-mark {
        color: #4caf50;
        margin-left: 8px;
        font-weight: bold;
      }
      .completed-banner {
        background-color: #e8f5e9;
        border-left: 5px solid #4caf50;
        padding: 10px;
        margin-bottom: 10px;
        display: none;
      }
    </style>
  </head>

      async function preloadAll() {

            }
          });
        });

        // Use sequential preloading to avoid overwhelming the browser, but don't await them
        for (const path of allPaths) {
          if (!docCache[path]) {
            fetch(path)
              .then(res => res.text())
              .then(text => {
                docCache[path] = text;
                // Preload notebooks found in the doc
                const viewSourceRegex = /<ViewSource\s+path="([^"]+)"\s*\/>/g;
                let vsMatch;
                while ((vsMatch = viewSourceRegex.exec(text)) !== null) {
                  const nbPath = vsMatch[1];
                  if (!notebookCache[nbPath]) {
                    fetch("static" + nbPath)
                      .then(res => res.json())
                      .then(j => {
                        notebookCache[nbPath] = j;
                      })
                      .catch(() => {});
                  }
                }
              })
              .catch(() => {});
          }
        }
      }

      async function loadDoc(path) {
        currentDocPath = path;
        updateNavButtons();
        
        // スクロール位置をトップに戻す
        document.getElementById("content-area").scrollTop = 0;
        
        const runnerArea = document.getElementById("runner-area");

        if (path === "special:learning-record") {
          runnerArea.style.display = "none";
          renderLearningRecord();
          return;
        }

        runnerArea.style.display = "flex";
        pageContentEl.innerHTML = "";
        try {
          let text;
          if (docCache[path]) {
            text = docCache[path];
          } else {
            const res = await fetch(path);
            text = await res.text();
            docCache[path] = text;
          }
          const dir = path.substring(0, path.lastIndexOf("/") + 1);

          // Handle Docusaurus imports: import varName from "./path.png"
          const imports = {};
          const importRegex = /import\s+(\w+)\s+from\s+['"]\.\/(.+?)['"]/g;
          let match;
          while ((match = importRegex.exec(text)) !== null) {
            imports[match[1]] = dir + match[2];
          }

          // Remove frontmatter and imports
          text = text
            .replace(/---[\s\S]*?---/, "")
            .replace(/import .* from .*;?$/gm, "");

          // Ensure at least two newlines at the beginning to separate from any remaining artifacts
          text = "\n\n" + text;

          // Handle DocCardList and other MDX tags
          text = text
            .replace(/<DocCardList\s*\/>/g, "")
            .replace(/<[^>]+(Answer|ViewSource)[^>]*\/>/g, (m) => m); // Keep Answer and ViewSource, strip others

          // Convert MDX style={{...}} to standard HTML style="..."
          text = text.replace(/style=\{\{(.*?)\}\}/g, (match, p1) => {
            const style = p1
              .split(",")
              .map((s) => {
                const parts = s.split(":").map((x) => x.trim().replace(/['"]/g, ""));
                if (parts.length < 2) return "";
                const [k, v] = parts;
                const kebab = k.replace(/[A-Z]/g, (m) => "-" + m.toLowerCase());
                return `${kebab}: ${v}`;
              })
              .filter((s) => s)
              .join("; ");
            return `style="${style}"`;
          });

          // Replace imported image variables: {varName} -> path/to/image.png
          for (const [varName, imgPath] of Object.entries(imports)) {
            const varRegex = new RegExp(`\\{${varName}\\}`, "g");
            text = text.replace(varRegex, imgPath);
          }

          // Fix paths for images and other assets
          const resolvePath = (p) => {
            p = p.trim();
            if (p.startsWith("http") || p.startsWith("/")) return p;
            if (p.startsWith("docs/") || p.startsWith("static/")) return p;
            return dir + p.replace(/^\.\//, "");
          };

          // Replace Markdown images: ![alt](path)
          text = text.replace(/!\[(.*?)\]\((?!http|docs\/|static\/)(.*?)\)/g, (m, alt, p) => {
            return `![${alt}](${resolvePath(p)})`;
          });

          // Replace HTML-style src: src="path"
          text = text.replace(/src=["'](?!http|docs\/|static\/)(.*?)["']/g, (m, p) => {
            return m.replace(p, resolvePath(p));
          });

          // ViewSource processing with Preview
          const viewSourceRegex = /<ViewSource\s+path="([^"]+)"\s*\/>/g;
          let vsMatch;
          const vsTasks = [];
          while ((vsMatch = viewSourceRegex.exec(text)) !== null) {
            vsTasks.push({ full: vsMatch[0], path: vsMatch[1] });
          }

          if (vsTasks.length > 0) {
            loadNotebook(vsTasks[0].path);
          }

          const vsPreviews = [];
          for (let i = 0; i < vsTasks.length; i++) {
            const task = vsTasks[i];
            const placeholder = `VS_PLACEHOLDER_${i}_VS`;
            text = text.replace(task.full, placeholder);
            
            try {
              let j;
              if (notebookCache[task.path]) {
                j = notebookCache[task.path];
              } else {
                const res = await fetch("static" + task.path);
                j = await res.json();
                notebookCache[task.path] = j;
              }
              const code = j.cells
                .filter((c) => c.cell_type === "code")
                .map((c) => c.source.join(""))
                .join("\n\n")
                .trim();
              const preview = `<button class="view-source-btn" data-path="${task.path}" onclick="loadNotebook('${
                task.path
              }')">▶ エディタに読み込む (${task.path
                .split("/")
                .pop()})</button><pre class="language-python"><code class="language-python">${md.utils.escapeHtml(
                code
              )}</code></pre>`;
              vsPreviews[i] = preview;
            } catch (e) {
              console.error("Failed to load preview:", e);
              vsPreviews[i] = `<button class="view-source-btn" data-path="${task.path}" onclick="loadNotebook('${
                  task.path
                }')">▶ コードを読み込む (${task.path
                  .split("/")
                  .pop()})</button>`;
            }
          }

          // Admonition processing (:::note etc.)
          text = text.replace(
            /^:::(note|tip|info|caution|danger|warning)(.*)$([\s\S]*?)^:::$/gm,
            (m, type, title, content) => {
              const displayTitle = (title.trim() || type).toUpperCase();
              return `<div class="admonition ${type}"><span class="admonition-chip">${displayTitle}</span><div class="admonition-content">\n\n${content.trim()}\n\n</div></div>\n`;
            }
          );

          // Hide stray or closing ::: that didn't match the block above
          text = text.replace(/^:::.*$/gm, "");

          let html = md.render(text);
          for (let i = 0; i < vsPreviews.length; i++) {
            html = html.replace(`VS_PLACEHOLDER_${i}_VS`, vsPreviews[i]);
          }
          pageContentEl.innerHTML = html;

          // Trigger Syntax Highlighting
          Prism.highlightAllUnder(pageContentEl);
          updateCheckmarks();

          // Trigger KaTeX rendering
          if (window.renderMathInElement) {
            renderMathInElement(pageContentEl, {
              delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\(", right: "\\)", display: false },
                { left: "\\[", right: "\\]", display: true },
              ],
              throwOnError: false,
            });
          }
        } catch (err) {
          pageContentEl.innerHTML = "失敗";
          console.error(err);
        }
      }

      function renderLearningRecord() {
        const progress = getProgress();
        let html = "<h1>学習内容と記録</h1>";
        
        html += '<table class="progress-table">';
        html += "<thead><tr><th>カテゴリー</th><th>ページ</th><th>演習内容</th><th>達成度</th></tr></thead><tbody>";
        
        docsNav.forEach(cat => {
          if (cat.items) {
            cat.items.forEach(item => {
              if (item.path.startsWith("special:")) return;
              
              const exercises = item.exercises || [];
              if (exercises.length === 0) return; // 演習がないページは表示しない
              
              exercises.forEach((exPath, idx) => {
                const isCompleted = progress[exPath] && progress[exPath].completed;
                const status = isCompleted ? '<span class="status-badge status-completed">完了</span>' : '<span class="status-badge status-incomplete">未着手</span>';
                const exName = exPath.split("/").pop();
                html += `<tr>`;
                if (idx === 0) {
                  html += `<td rowspan="${exercises.length}">${cat.category}</td><td rowspan="${exercises.length}">${item.title}</td>`;
                }
                html += `<td>${exName}</td><td>${status}</td></tr>`;
              });
            });
          }
        });
        
        html += "</tbody></table>";
        pageContentEl.innerHTML = html;
      }

      async function loadNotebook(p) {
        currentNotebookPath = p;
        try {
          let j;
          if (notebookCache[p]) {
            j = notebookCache[p];
          } else {
            const res = await fetch("static" + p);
            j = await res.json();
            notebookCache[p] = j;
          }
          const code = j.cells
            .filter((c) => c.cell_type === "code")
            .map((c) => c.source.join(""))
            .join("\n\n");
          if (editor) {
            const formattedCode = code;
            editor.setValue(formattedCode);
          }
          statusEl.textContent = "";

          // Get expected output
          if (pyodide) {
            try {
              const cleanCode = code.replace(/^!pip.*$/gm, "").replace(/^%.*$/gm, "");
              // Load required packages
              statusEl.textContent = "ライブラリ準備中...";
              await pyodide.loadPackagesFromImports(cleanCode);
              
              // Disable show() during background execution to prevent unwanted rendering
              await pyodide.runPythonAsync("import matplotlib.pyplot as plt\nif not hasattr(plt, '_original_show'): plt._original_show = plt.show\nplt.show = lambda *args, **kwargs: None");
              
              const result = await pyodide.runPythonAsync(cleanCode);
              
              // Safe cleanup of figures created during background run
              await pyodide.runPythonAsync("try: plt.close('all')\nexcept: pass\nplt.show = plt._original_show");

              if (result !== undefined) {
                const reprFunc = pyodide.globals.get("repr");
                expectedOutput = reprFunc(result);
                reprFunc.destroy();
                if (result && result.destroy) result.destroy();
              } else {
                expectedOutput = null;
              }
              statusEl.textContent = "";
            } catch (e) {
              console.error("Failed to get expected output:", e);
              // Ensure show() is restored even on error
              try { await pyodide.runPythonAsync("if hasattr(plt, '_original_show'): plt.show = plt._original_show"); } catch(re) {}
              expectedOutput = null;
              statusEl.textContent = "";
            }
          }
        } catch (err) {
          statusEl.textContent = "失敗";
        }
      }
      runButton.onclick = async () => {
        if (!pyodide || !editor) return;
        consoleOutputEl.innerHTML = "";
        runButton.disabled = true;
        statusEl.textContent = "実行中...";
        try {
          let code = editor.getValue();
          const lines = code.split("\n"),
            processed = [];
          for (let l of lines) {
            const t = l.trim();
            const m = t.match(/^!pip\s+install\s+(.+)$/);
            if (m) {
              const pkgs = m[1]
                .split(/\s+/)
                .map((p) => p.trim())
                .filter((p) => p && p !== "ita");
              if (pkgs.length > 0)
                await pyodide.runPythonAsync(
                  `import micropip\nawait micropip.install(${JSON.stringify(
                    pkgs
                  )})`
                );
              processed.push("# " + l);
            } else if (t.startsWith("%")) {
              processed.push("# " + l);
            } else {
              processed.push(l);
            }
          }
          await pyodide.runPythonAsync(
            `import matplotlib.pyplot as plt\nplt.close('all')`
          );

          // Clear existing render outputs
          document
            .querySelectorAll('div[id^="matplotlib_"]')
            .forEach((d) => d.remove());
          document.querySelectorAll("canvas").forEach((c) => c.remove());
          modalRenderAreaEl.innerHTML = "";

          const result = await pyodide.runPythonAsync(processed.join("\n"));
          let resultStr = "";
          if (result !== undefined) {
            const reprFunc = pyodide.globals.get("repr");
            resultStr = reprFunc(result);
            appendConsole(resultStr);
            reprFunc.destroy();
            if (result && result.destroy) result.destroy();
          }

          // Check for completion
          if (currentNotebookPath) {
            if (expectedOutput !== null && resultStr === expectedOutput) {
              saveProgress(currentNotebookPath, true);
            } else if (expectedOutput === null && result !== undefined) {
              saveProgress(currentNotebookPath, true);
            }
          }

          // Collect Matplotlib containers (including download buttons)
          const containers = document.querySelectorAll(
            'div[id^="matplotlib_"]'
          );
          const canvases = document.querySelectorAll("canvas");

          if (containers.length > 0 || canvases.length > 0) {
            if (containers.length > 0) {
              containers.forEach((c) => {
                if (c.id !== "modal-render-area")
                  modalRenderAreaEl.appendChild(c);
              });
            } else {
              canvases.forEach((c) => {
                if (!modalRenderAreaEl.contains(c))
                  modalRenderAreaEl.appendChild(c);
              });
            }
            renderModalEl.style.display = "flex";
            if (currentNotebookPath) {
               saveProgress(currentNotebookPath, true);
            }
          }
          statusEl.textContent = "完了";
        } catch (err) {
          appendConsole("エラー: " + err.message, true);
          statusEl.textContent = "エラー";
        } finally {
          runButton.disabled = false;
        }
      };
      init();
    </script>
  </body>
</html>
